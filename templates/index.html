<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Битва округов — Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

        <div class="registration-options">

                <p>4 человека, капитан + 3 участника</p>

            </div>
            
            <div class="option-card" onclick="window.location.href='{{ url_for('register_solo') }}'">
                <h2>🏃 ИНДИВИДУАЛЬНАЯ РЕГИСТРАЦИЯ</h2>
                <p>1 человек, распределение в команду</p>

            </div>
        </div>
        
        <div id="limitsInfo" class="limits-info">
            <!-- Здесь можно динамически подгружать лимиты через JS -->
        </div>
